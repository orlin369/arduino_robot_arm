; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32

; ── Shared defaults ──────────────────────────────────────────────────────────
[env]
framework     = arduino
monitor_speed = 115200

; ── Arduino UNO ──────────────────────────────────────────────────────────────
[env:uno]
platform     = atmelavr
board        = uno
upload_port  = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_flags  = -D TARGET_UNO
lib_deps     =
    arduino-libraries/Servo@^1.2.1

; ── ESP32 (Arduino form-factor, sensor-shield wiring) ────────────────────────
[env:esp32]
platform     = espressif32
board        = esp32dev
upload_port  = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_flags  = -D TARGET_ESP32
lib_deps     =
    madhephaestus/ESP32Servo@^3.0.5

; ── ESP32 servo center smoke-test — all 6 servos (no TCM / serial) ───────────
[env:esp32-test]
platform     = espressif32
board        = esp32dev
upload_port  = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_flags  = -D TARGET_ESP32 -D SERVO_CENTER_TEST
lib_deps     =
    madhephaestus/ESP32Servo@^3.0.5

; ── ESP32 servo center smoke-test — base servo only ──────────────────────────
[env:esp32-test1]
platform     = espressif32
board        = esp32dev
upload_port  = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_flags  = -D TARGET_ESP32 -D SERVO_CENTER_TEST -D SERVO_SINGLE_TEST
lib_deps     =
    madhephaestus/ESP32Servo@^3.0.5

; ── ESP32 servo bare test — base only, raw attach, no allocateTimer ───────────
[env:esp32-test2]
platform     = espressif32
board        = esp32dev
upload_port  = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_flags  = -D TARGET_ESP32 -D SERVO_CENTER_TEST -D SERVO_BARE_TEST
